name: SitHere
options:
  bundleIdPrefix: com.sithere
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: 5.10
    MARKETING_VERSION: 1.0.0
    CURRENT_PROJECT_VERSION: 1
targets:
  SitHere:
    type: application
    platform: iOS
    sources:
      - SitHereApp
    resources:
      - SitHereApp/Resources
    info:
      path: SitHereApp/Info.plist
    entitlements:
      path: SitHereApp/SitHere.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sithere.app
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
  SitHereTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - SitHereTests
    dependencies:
      - target: SitHere
